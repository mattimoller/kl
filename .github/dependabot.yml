version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    groups:
      all-npm:
        patterns: ["*"]

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    groups:
      all-terraform:
        patterns: ["*"]
