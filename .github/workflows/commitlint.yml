# Lints the PR title against the Conventional Commits spec.
#
# We squash-merge with the PR title as the commit subject, so the PR title
# is what lands on `main`. Linting it here is the same outcome as running
# `commitlint` against the post-squash commit message.
#
# Allowed types come from the conventional-commits standard set (feat, fix,
# chore, docs, ci, build, refactor, test, perf, style, revert). The action
# uses that set by default.

name: Lint PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
